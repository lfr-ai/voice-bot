[tox]
envlist = unit, property, lint, typecheck
skipsdist = true

[testenv]
runner = uv-venv-runner
deps = .[dev]
setenv =
    EKKO_ENVIRONMENT = test
    PYTHONPATH = {toxinidir}/src

[testenv:unit]
commands = pytest tests/unit/ -v --tb=short -x

[testenv:property]
commands = pytest tests/property/ -v --tb=short

[testenv:lint]
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/

[testenv:typecheck]
commands = mypy src/ekko/
