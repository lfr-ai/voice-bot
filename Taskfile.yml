version: "3"

vars:
  PYTHON_SRC: src tests
  BACKEND_DIR: .
  FRONTEND_DIR: frontend

tasks:
  # ── Installation ─────────────────────────────────────────────
  install:
    desc: Install all dependencies (backend + frontend)
    cmds:
      - uv sync --all-extras
      - cd {{.FRONTEND_DIR}} && bun install

  install:backend:
    desc: Install backend dependencies
    cmds:
      - uv sync --all-extras

  install:frontend:
    desc: Install frontend dependencies
    cmds:
      - cd {{.FRONTEND_DIR}} && bun install

  # ── Development ──────────────────────────────────────────────
  dev:
    desc: Run backend + frontend in parallel
    deps: [dev:backend, dev:frontend]

  dev:backend:
    desc: Run FastAPI app in reload mode
    cmds:
      - uv run uvicorn voice.interaction.main:app --reload --host 127.0.0.1 --port 8000

  dev:frontend:
    desc: Run frontend dev server
    cmds:
      - cd {{.FRONTEND_DIR}} && bun run dev

  # ── Testing ──────────────────────────────────────────────────
  test:
    desc: Run full backend test suite
    cmds:
      - uv run pytest tests/ -v --tb=short

  test:unit:
    desc: Run unit tests only
    cmds:
      - uv run pytest tests/unit/ -v --tb=short

  test:integration:
    desc: Run integration tests only
    cmds:
      - uv run pytest tests/integration/ -v --tb=short -m integration

  test:property:
    desc: Run property-based tests
    cmds:
      - uv run pytest tests/property/ -v --tb=short

  test:performance:
    desc: Run performance benchmarks
    cmds:
      - uv run pytest tests/performance/ -v --benchmark-only

  test:e2e:
    desc: Run end-to-end tests
    cmds:
      - uv run pytest tests/e2e/ -v --tb=short

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - uv run pytest tests/ --cov=src/voice --cov-report=term-missing --cov-report=html

  # ── Linting ──────────────────────────────────────────────────
  lint:
    desc: Run all linters
    deps: [lint:python, lint:types, lint:yaml, lint:spelling]

  lint:python:
    desc: Run ruff linter
    cmds:
      - uv run ruff check {{.PYTHON_SRC}}

  lint:types:
    desc: Run type checker
    cmds:
      - uv run mypy --config-file pyproject.toml src

  lint:yaml:
    desc: Lint YAML files
    cmds:
      - uv run yamllint -c .yamllint.yaml .

  lint:spelling:
    desc: Check for typos
    cmds:
      - typos {{.PYTHON_SRC}}

  lint:frontend:
    desc: Lint frontend with biome
    cmds:
      - cd {{.FRONTEND_DIR}} && bun run lint

  lint:shell:
    desc: Lint shell scripts
    cmds:
      - shellcheck scripts/*.sh 2>/dev/null || true

  lint:secrets:
    desc: Scan for secrets
    cmds:
      - uv run detect-secrets scan --baseline .secrets.baseline

  lint:duplicates:
    desc: Detect copy-paste
    cmds:
      - npx jscpd --config .jscpd.json

  # ── Formatting ───────────────────────────────────────────────
  format:
    desc: Format all code
    cmds:
      - uv run ruff format {{.PYTHON_SRC}}
      - uv run ruff check --fix {{.PYTHON_SRC}}

  format:check:
    desc: Check formatting without modifying files
    cmds:
      - uv run ruff format --check {{.PYTHON_SRC}}

  # ── Type checking ────────────────────────────────────────────
  typecheck:
    desc: Run type checker
    cmds:
      - uv run mypy --config-file pyproject.toml src

  # ── Code quality ─────────────────────────────────────────────
  xenon:
    desc: Check code complexity
    cmds:
      - uv run xenon --max-absolute=C --max-modules=B --max-average=A src

  # ── Architecture ─────────────────────────────────────────────
  architecture:
    desc: Validate Clean Architecture import boundaries
    cmds:
      - uv run python scripts/check_architecture_boundaries.py

  # ── Pre-commit ───────────────────────────────────────────────
  pre-commit:
    desc: Run pre-commit hooks against all files
    cmds:
      - uvx pre-commit run --all-files

  # ── Database ─────────────────────────────────────────────────
  db:migrate:
    desc: Run alembic migrations to head
    cmds:
      - uv run alembic upgrade head

  db:revision:
    desc: Create a new alembic revision
    cmds:
      - uv run alembic revision --autogenerate -m "{{.CLI_ARGS}}"

  db:downgrade:
    desc: Downgrade one alembic revision
    cmds:
      - uv run alembic downgrade -1

  db:reset:
    desc: Downgrade all and re-migrate
    cmds:
      - uv run alembic downgrade base
      - uv run alembic upgrade head

  # ── Security ─────────────────────────────────────────────────
  security:audit:
    desc: Audit dependencies for known vulnerabilities
    cmds:
      - uv run pip-audit

  # ── Frontend ─────────────────────────────────────────────────
  frontend:test:
    desc: Run frontend unit tests
    cmds:
      - cd {{.FRONTEND_DIR}} && bun run test

  frontend:e2e:
    desc: Run frontend Playwright tests
    cmds:
      - cd {{.FRONTEND_DIR}} && bunx playwright test

  frontend:build:
    desc: Build frontend for production
    cmds:
      - cd {{.FRONTEND_DIR}} && bun run build

  frontend:format:
    desc: Format frontend code
    cmds:
      - cd {{.FRONTEND_DIR}} && bun run format

  # ── Cleanup ──────────────────────────────────────────────────
  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist build .pytest_cache .mypy_cache .ruff_cache htmlcov .coverage
      - find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

  # ── Registry ─────────────────────────────────────────────────
  registry:generate:
    desc: Generate Python constants from naming registry
    cmds:
      - uv run python registry/generate_registry.py

  # ── Full quality gate ────────────────────────────────────────
  check:
    desc: Full local quality gate (lint + test + type check)
    deps: [lint, test:unit, typecheck, xenon]
