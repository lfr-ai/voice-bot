services:
  app:
    build:
      context: .
      dockerfile: Containerfile
      target: dev
    environment:
      EKKO_ENVIRONMENT: test
      EKKO_POSTGRESQL_HOST: db
      EKKO_POSTGRESQL_PORT: "5432"
      EKKO_POSTGRESQL_USER: postgres
      EKKO_POSTGRESQL_PASSWORD: postgres
      EKKO_POSTGRESQL_NAME: ekko_test
    command: ["uv", "run", "pytest", "tests/", "-v", "--tb=short"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ekko_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend

networks:
  backend:
