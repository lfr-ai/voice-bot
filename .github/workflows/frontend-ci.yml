name: Frontend CI

on:
  push:
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies (bun)
        run: |
          curl -fsSL https://bun.sh/install | bash || true
          export BUN_INSTALL="$HOME/.bun"
          $HOME/.bun/bin/bun install --cwd frontend || true
      - name: Build
        run: |
          $HOME/.bun/bin/bun run --cwd frontend build || true
