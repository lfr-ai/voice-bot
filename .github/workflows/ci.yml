name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint, Type, and Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PDM
        run: |
          python -m pip install --upgrade pip
          pip install pdm

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pdm
          key: ${{ runner.os }}-pdm-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pdm-

      - name: Install dependencies
        run: pdm install -d

      - name: Run pre-commit
        run: pdm run pre-commit run --all-files

      - name: Type check
        run: pdm run mypy src

      - name: Run tests
        run: pdm run pytest -q

  architecture:
    name: Enforce Clean Architecture boundaries
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Check core layer has no outward imports
        run: |
          if rg "from\s+voice\.(application|infrastructure|presentation|config|interaction|models|managers)" src/voice/core -n --hidden; then
            echo "::error::Found outward imports from core layer. Fix imports to follow Clean Architecture.";
            exit 1;
          fi
          if rg "from\s+voice\.infrastructure" src/voice/application -n --hidden; then
            echo "::error::Found direct infrastructure imports in application layer. Use protocols from core.";
            exit 1;
          fi
          echo "Clean Architecture import boundaries OK"

  links:
    name: Check links
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --config .lychee.toml
            "**/*.md"
          fail: true

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Lint shell scripts
        run: |
          if [ -d .github/hooks/scripts ]; then
            shellcheck --severity=warning .github/hooks/scripts/*.sh
          fi
          if [ -d scripts ]; then
            shellcheck --severity=warning scripts/*.sh || true
          fi
