name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint, Type, and Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv (package manager)
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml','**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies (prefer lockfile, fallback to all-extras)
        run: |
          set -e
          uv sync --locked || uv sync --all-extras

      - name: Run pre-commit
        run: uvx pre-commit run --all-files

      - name: Lint (ruff)
        run: uvx ruff check src tests

      - name: Type check (mypy)
        run: uvx mypy src

      - name: Run tests
        run: uvx pytest -q

  architecture:
    name: Enforce Clean Architecture boundaries
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Check core layer has no outward imports
        run: |
          if rg "from\s+ekko\.(application|infrastructure|presentation|config|interaction|models|managers)" src/ekko/core -n --hidden; then
            echo "::error::Found outward imports from core layer. Fix imports to follow Clean Architecture.";
            exit 1;
          fi
          if rg "from\s+ekko\.infrastructure" src/ekko/application -n --hidden; then
            echo "::error::Found direct infrastructure imports in application layer. Use protocols from core.";
            exit 1;
          fi
          echo "Clean Architecture import boundaries OK"

  links:
    name: Check links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --config .lychee.toml
            "**/*.md"
          fail: true

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Lint shell scripts
        run: |
          if [ -d .github/hooks/scripts ]; then
            shellcheck --severity=warning .github/hooks/scripts/*.sh
          fi
          if [ -d scripts ]; then
            shellcheck --severity=warning scripts/*.sh || true
          fi
