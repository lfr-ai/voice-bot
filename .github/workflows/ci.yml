name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint, type check, and test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: cd backend && uv sync --locked --all-extras --dev

      - name: Lint (ruff)
        run: cd backend && uv run ruff check src tests

      - name: Format check (ruff)
        run: cd backend && uv run ruff format --check src tests

      - name: Type check (ty)
        run: cd backend && uv run ty check src/ekko

      - name: Run unit tests
        run: cd backend && uv run pytest tests/unit -q

      - name: Prune uv cache
        run: uv cache prune --ci

  security:
    name: Security scans
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: cd backend && uv sync --locked --all-extras --dev

      - name: Run bandit
        run: cd backend && uv run python -m bandit -c bandit.toml -r src/ekko

      - name: Run pip-audit
        run: cd backend && uv run pip-audit

      - name: Run detect-secrets
        run: cd backend && uv run detect-secrets scan --baseline ../.secrets.baseline

      - name: Prune uv cache
        run: uv cache prune --ci

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: cd backend && uv sync --locked --all-extras --dev

      - name: Run integration tests
        run: cd backend && uv run python -m pytest tests/integration -v --tb=short -m integration

      - name: Prune uv cache
        run: uv cache prune --ci

  architecture:
    name: Clean Architecture boundaries
    runs-on: ubuntu-latest
    needs: [lint-and-test, security, test-integration]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Check import boundaries
        run: |
          if rg "from\s+ekko\.(application|infrastructure|presentation)" backend/src/ekko/core -n; then
            echo "::error::Found outward imports from core layer.";
            exit 1;
          fi
          if rg "from\s+ekko\.infrastructure" backend/src/ekko/application -n; then
            echo "::error::Found direct infrastructure imports in application layer.";
            exit 1;
          fi
          echo "Clean Architecture import boundaries OK"

  links:
    name: Check links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --config .lychee.toml
            "**/*.md"
          fail: true

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Lint shell scripts
        run: |
          if [ -d .github/hooks/scripts ]; then
            shellcheck --severity=warning .github/hooks/scripts/*.sh
          fi
          if [ -d scripts ]; then
            shellcheck --severity=warning scripts/*.sh || true
          fi

  actionlint:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.12
