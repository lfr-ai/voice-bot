name: Upload coverage to Codecov

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  codecov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
          - name: Set up Python
            uses: actions/setup-python@v5
            with:
              python-version: '3.11'
          - name: Install uv
            uses: astral-sh/setup-uv@v8.0.0
            with:
              enable-cache: true
          - name: Install deps
            run: |
              uv sync --all-extras
          - name: Run tests with coverage
            run: uvx pytest --quiet --maxfail=1 --cov=src --cov-report=xml
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
