globs:
  - "**/*.md"

ignores:
  - "node_modules/**"
  - "**/node_modules/**"
  - ".venv/**"
  - "**/.venv/**"
  - "dist/**"
  - "htmlcov/**"
  - "logs/**"

config:
  default: true
  MD013:
    line_length: 120
    code_blocks: false
    tables: false
    headings: false
  MD024:
    siblings_only: true
  MD046:
    style: fenced
  MD048:
    style: backtick
