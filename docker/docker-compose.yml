version: '3.8'
services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - redis
      - db

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  db:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
version: '3.8'
services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    ports:
      - '6500:6500'
      - '6600:6600'
    environment:
      - OPENAI_KEY=${OPENAI_KEY}
    volumes:
      - ../src:/app/src:ro
