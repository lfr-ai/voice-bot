version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    # For security do not hardcode credentials here. Use an .env file or
    # an external secret manager in production. Example environment values
    # are read from the environment at runtime (or from an .env file).
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-voice}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
