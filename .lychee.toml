cache = true
max_cache_age = "1d"
max_concurrency = 16
timeout = 30
max_retries = 3
max_redirects = 3
retry_wait_time = 5
accept = [200, 203, 204, 301, 302, 403, 429]

exclude = [
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://0\\.0\\.0\\.0",
  "^https?://\\[::1\\]",
  "^https?://example\\.com",
  "\\{\\{",
  "\\{\\%",
  "\\$\\{",
]

exclude_path = [
  "node_modules",
  ".git",
  "dist",
  "build",
  ".venv",
  "__pycache__",
  ".tox",
  ".*.egg-info",
  "pdm.lock",
  ".env.*",
]

skip_missing = true
include_verbatim = true
no_progress = true
