minimum_pre_commit_version: "4.0"
default_language_version:
  python: python3.12

repos:
  # ── General file checks ────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=6000]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-executables-have-shebangs
      - id: fix-byte-order-marker
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  # ── Ruff (lint + format) ───────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.11
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── Security ───────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  # ── YAML / Markdown / Shell ────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yaml]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # ── Spelling / Quality ─────────────────────────────────────
  - repo: https://github.com/crate-ci/typos
    rev: v1.35.5
    hooks:
      - id: typos

  - repo: https://github.com/rubik/xenon
    rev: v0.9.3
    hooks:
      - id: xenon
        args: [--max-absolute=C, --max-modules=B, --max-average=A, src]

  # ── Commit messages ────────────────────────────────────────
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]
      - id: commitizen-branch
        stages: [pre-push]

  # ── GitHub Actions ─────────────────────────────────────────
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  # ── Docker ─────────────────────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker

  # ── Copy-paste detection (manual stage) ────────────────────
  - repo: local
    hooks:
      - id: jscpd
        name: jscpd copy-paste detection
        entry: npx jscpd --config .jscpd.json
        language: node
        types_or: [python, javascript, typescript, tsx]
        stages: [manual]

      # ── Backend test suite ───────────────────────────────────
      - id: backend-test-suite
        name: backend tests
        entry: uv run pytest tests/unit/ -x --tb=short -q
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-push]

      # ── Frontend checks ─────────────────────────────────────
      - id: biome-check
        name: biome lint + format check
        entry: bash -c 'cd frontend && bun run biome check .'
        language: system
        pass_filenames: false
        types_or: [javascript, typescript, tsx, json]

      - id: frontend-test-suite
        name: frontend tests
        entry: bash -c 'cd frontend && bun run test'
        language: system
        pass_filenames: false
        types_or: [javascript, typescript, tsx]
        stages: [pre-push]
