minimum_pre_commit_version: "4.0"
default_language_version:
  python: python3.12

repos:
  # -- General file checks -------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-json
        exclude: ^\.vscode/settings\.json$
      - id: check-ast
      - id: check-merge-conflict
      - id: check-docstring-first
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-illegal-windows-names
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: fix-byte-order-marker
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]
      - id: debug-statements
      - id: name-tests-test
        args: [--pytest-test-first]
        files: ^backend/tests/

  # -- Ruff (lint + format) ------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # -- Commit messages -----------------------------------------------------
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.10
    hooks:
      - id: commitizen
        stages: [commit-msg]
      - id: commitizen-branch
        stages: [pre-push]

  # -- Security ------------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
          - --exclude-files
          - (^|[\\/])tests[\\/]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: [-c, backend/bandit.toml]
        additional_dependencies: ["bandit[toml]"]

  # -- YAML / Markdown / Shell ---------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yaml]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.0
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        exclude: \.zsh$

  # -- Dockerfile linting --------------------------------------------------
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint
        args: [-c, .hadolint.yaml]
        exclude: \.dockerignore$

  # -- Spelling / Quality --------------------------------------------------
  - repo: https://github.com/crate-ci/typos
    rev: v1.45.1
    hooks:
      - id: typos

  - repo: https://github.com/rubik/xenon
    rev: v0.9.3
    hooks:
      - id: xenon
        args: [--max-absolute=C, --max-modules=B, --max-average=A, backend/src]

  # -- GitHub Actions ------------------------------------------------------
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # -- Local hooks ---------------------------------------------------------
  - repo: local
    hooks:
      # Architecture and code quality enforcement
      - id: check-architecture-boundaries
        name: Check Clean Architecture boundaries
        entry: python tools/security/check_architecture_boundaries.py
        language: system
        pass_filenames: false
        types: [python]
        # Runs at pre-commit stage to block commits with violations

      - id: check-magic-strings
        name: Check for magic strings
        entry: python tools/conventions/check_magic_strings.py --verbose
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-push]
        # Runs at pre-push stage to allow local work-in-progress

      - id: ty-check
        name: ty type check
        entry: bash -c 'cd backend && uv tool run ty check src/ekko'
        language: system
        pass_filenames: false
        types: [python]

      - id: module-docstrings
        name: check module docstrings
        entry: >
          bash -c 'cd backend &&
          find src/ekko -name "*.py" ! -name "__init__.py" ! -path "*/__pycache__/*" |
          while read f; do head -5 "$f" | grep -q "\"\"\"" || echo "Missing docstring: $f"; done |
          (! grep .)'
        language: system
        pass_filenames: false
        types: [python]

      - id: dependency-audit
        name: dependency vulnerability audit
        entry: bash -c 'cd backend && uv run pip-audit --strict 2>/dev/null || true'
        language: system
        pass_filenames: false
        stages: [manual]

      - id: jscpd
        name: jscpd copy-paste detection
        entry: npx jscpd --config .jscpd.json
        language: node
        types_or: [python, javascript, ts, tsx]
        stages: [manual]

      - id: lychee
        name: lychee link checker
        entry: lychee --no-progress -c .lychee.toml .
        language: system
        pass_filenames: false
        types_or: [markdown, html, rst]
        stages: [manual]

      - id: backend-test-suite
        name: backend tests
        entry: bash -c 'cd backend && uv run pytest tests/unit/ -x --tb=short -q'
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-push]

      - id: biome-check
        name: biome lint + format check
        entry: bash -c 'cd frontend && bun run biome check .'
        language: system
        pass_filenames: false
        types_or: [javascript, ts, tsx, json]

      - id: frontend-test-suite
        name: frontend tests
        entry: bash -c 'cd frontend && bun run test'
        language: system
        pass_filenames: false
        types_or: [javascript, ts, tsx]
        stages: [pre-push]
